name: Playwright Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true
          BASE_URL: ${{ secrets.BASE_URL }}
          LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
          OTP: ${{ secrets.OTP }}
          PASSWORD: ${{ secrets.PASSWORD }}
          MERCHANT_ID: ${{ secrets.MERCHANT_ID }}
          SEARCHABLE_LIBRARY_ID: ${{ secrets.SEARCHABLE_LIBRARY_ID }}
          SHARE_LIBRARY_ID_1: ${{ secrets.SHARE_LIBRARY_ID_1 }}
          SHARE_LIBRARY_ID_2: ${{ secrets.SHARE_LIBRARY_ID_2 }}
          SHARE_LIBRARY_ID_3: ${{ secrets.SHARE_LIBRARY_ID_3 }}
          SHARE_LIBRARY_ID_4: ${{ secrets.SHARE_LIBRARY_ID_4 }}
          LAUNCH_DATE_FROM: ${{ secrets.LAUNCH_DATE_FROM }}
          LAUNCH_DATE_TO: ${{ secrets.LAUNCH_DATE_TO }}

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results (traces)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 7
